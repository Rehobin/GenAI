<!DOCTYPE html>
<html>
<head>
 <title>GenAI App</title>
</head>
<body>
 <h2>Ask AI</h2>
 <input type="text" id="prompt" placeholder="Enter prompt">
 <button onclick="sendPrompt()">Submit</button>
 <p id="result"></p>
 <script>
 async function sendPrompt() {
 let prompt = document.getElementById("prompt").value;
 let resultText = document.getElementById("result");

 resultText.innerText = "Thinking...";
 try {
 let response = await fetch("http://127.0.0.1:5000/generate", {
 method: "POST",
 headers: {
 "Content-Type": "application/json"
 },
 body: JSON.stringify({prompt: prompt})
 });
 let data = await response.json();

 if (data.response) {
 resultText.innerText = data.response;
 } else {
 resultText.innerText = "Error: " + data.error;
 }
 } catch (error) {
 resultText.innerText = "Failed to connect to the server.";
 }
 }
 </script>
</body>
</html>
